spring.application.name=backend

# ── MongoDB Atlas Connection ───────────────────────────────────────────────────
# MONGO_URI must be set as an environment variable or in backend/.env
# Never hardcode credentials here — use the .env file locally.
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=paf_db

# Exclude the Spring Boot auto-configuration for MongoDB so our explicit
# MongoConfig bean is the single source of truth for the MongoClient.
# (Spring Boot 4.x workaround — removes the localhost:27017 fallback)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration

# Server
server.port=8080